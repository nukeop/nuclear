name: Close external PRs

on:
  pull_request_target:
    types: [opened]

jobs:
  close-if-external:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login != 'nukeop'
      && github.event.pull_request.user.login != 'renovate[bot]'
      && github.event.pull_request.user.login != 'crowdin-bot'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Close PR with explanation
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/close-external-pr.cjs');
            await script({ github, context });
