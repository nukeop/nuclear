# Flatpak manifest for Nuclear Music Player (from-source build)
#
# This builds Nuclear from source inside the Flatpak sandbox. Because the
# sandbox has no network access, npm and cargo dependencies must be vendored
# into two generated JSON files before building.
#
# Generate vendored dependency sources:
#
#   # pnpm dependencies (writes pnpm-sources.json)
#   flatpak-node-generator pnpm -o flatpak/pnpm-sources.json pnpm-lock.yaml
#
#   # cargo dependencies (writes cargo-sources.json)
#   python3 flatpak-cargo-generator.py \
#     -o flatpak/cargo-sources.json \
#     packages/player/src-tauri/Cargo.lock
#
# These files are NOT committed to the repo. Regenerate them whenever
# pnpm-lock.yaml or Cargo.lock changes.
#
# Build and install locally:
#
#   flatpak-builder --user --install --force-clean \
#     build-dir flatpak/com.nuclearplayer.Nuclear.yml
#
# Run:
#
#   flatpak run com.nuclearplayer.Nuclear

id: com.nuclearplayer.Nuclear

runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22

command: nuclear-music-player

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --filesystem=xdg-music
  - --filesystem=xdg-download
  - --own-name=org.mpris.MediaPlayer2.nuclear
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --env=FLATPAK=1

build-options:
  append-path: /usr/lib/sdk/node22/bin:/usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/nuclear-music-player/cargo
    npm_config_nodedir: /usr/lib/sdk/node22

modules:
  - name: nuclear-music-player
    buildsystem: simple
    sources:
      - type: dir
        path: ..
      - pnpm-sources.json
      - cargo-sources.json
    build-options:
      env:
        XDG_CACHE_HOME: /run/build/nuclear-music-player/cache
        npm_config_cache: /run/build/nuclear-music-player/npm-cache
        npm_config_offline: "true"
    build-commands:
      - corepack enable
      - pnpm install --offline --frozen-lockfile
      - pnpm --filter @nuclearplayer/player tauri build --no-bundle

      - install -Dm755 packages/player/src-tauri/target/release/nuclear-music-player
        /app/bin/nuclear-music-player

      - install -Dm644 packages/player/src-tauri/resources/com.nuclearplayer.Nuclear.desktop
        /app/share/applications/com.nuclearplayer.Nuclear.desktop
      - install -Dm644 packages/player/src-tauri/resources/com.nuclearplayer.Nuclear.metainfo.xml
        /app/share/metainfo/com.nuclearplayer.Nuclear.metainfo.xml

      - install -Dm644 flatpak/icons/512x512.png /app/share/icons/hicolor/512x512/apps/com.nuclearplayer.Nuclear.png
      - install -Dm644 flatpak/icons/256x256.png /app/share/icons/hicolor/256x256/apps/com.nuclearplayer.Nuclear.png
      - install -Dm644 flatpak/icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.nuclearplayer.Nuclear.png
      - install -Dm644 flatpak/icons/64x64.png /app/share/icons/hicolor/64x64/apps/com.nuclearplayer.Nuclear.png
      - install -Dm644 flatpak/icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.nuclearplayer.Nuclear.png

      - install -Dm644 LICENSE /app/share/licenses/com.nuclearplayer.Nuclear/LICENSE
